<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wasdwry 的个人网站</title>
<style>
:root{
    --text:#1f2933;
    --muted:#607084;
    --line:rgba(31,41,51,0.12);
    --panel:rgba(255,255,255,0.94);
    --primary:#1769aa;
    --primary-dark:#0f4d7d;
    --green:#2f7d5b;
}
*{ box-sizing:border-box; }
body{
    margin:0;
    font-family:Arial,"Microsoft YaHei",sans-serif;
    background:#eef4f8 url("assets/pixel-beach-bg.png") center top/cover fixed no-repeat;
    color:var(--text);
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(120deg,rgba(247,250,252,0.52),rgba(230,240,247,0.34));
    z-index:-1;
}
header{
    min-height:520px;
    padding:34px 20px 86px;
}
.navbar,.hero,.container{
    max-width:1120px;
    margin-left:auto;
    margin-right:auto;
}
.navbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
}
.logo{
    font-size:20px;
    font-weight:700;
}
nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:8px 18px;
}
nav a{
    color:#203247;
    text-decoration:none;
    font-weight:700;
}
.hero{
    margin-top:96px;
}
.hero h1{
    margin:0;
    font-size:clamp(42px,8vw,82px);
    line-height:1;
    letter-spacing:0;
}
.hero p{
    max-width:680px;
    margin:22px 0 0;
    color:#24384d;
    font-size:19px;
    line-height:1.75;
}
.actions{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:30px;
}
.button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 16px;
    border-radius:8px;
    border:1px solid transparent;
    background:var(--primary);
    color:white;
    text-decoration:none;
    font-weight:700;
    box-shadow:0 10px 24px rgba(23,105,170,0.22);
}
.button:hover{
    background:var(--primary-dark);
}
.button.secondary{
    background:rgba(255,255,255,0.78);
    color:#16324d;
    border-color:rgba(22,50,77,0.2);
    box-shadow:none;
}
.button.green{
    background:var(--green);
    box-shadow:0 10px 24px rgba(47,125,91,0.22);
}
.container{
    margin-top:-76px;
    padding:0 20px 52px;
}
.portal-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:18px;
}
.portal-card{
    min-height:230px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:24px;
    box-shadow:0 18px 45px rgba(31,41,51,0.12);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.portal-card h2{
    margin:0 0 12px;
    font-size:26px;
}
.portal-card p{
    margin:0;
    color:var(--muted);
    line-height:1.75;
}
.top-button{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:20;
    min-width:52px;
    min-height:42px;
    padding:0 12px;
    border-radius:8px;
    background:#16324d;
    color:white;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    box-shadow:0 10px 24px rgba(31,41,51,0.2);
}
footer{
    text-align:center;
    padding:34px 20px 44px;
    color:#536170;
}
@media (max-width:820px){
    header{
        min-height:560px;
    }
    .navbar{
        align-items:flex-start;
        flex-direction:column;
    }
    nav{
        justify-content:flex-start;
    }
    .hero{
        margin-top:68px;
    }
    .portal-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>
<header id="top">
    <div class="navbar">
        <div class="logo">wasdwry.github.io</div>
        <nav>
            <a href="index.html">首页</a>
            <a href="diary.html">日记</a>
            <a href="posts.html">文章</a>
            <a href="favorites.html">收藏</a>
            <a href="https://github.com/wasdwry/wasdwry.github.io" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </div>

    <div class="hero">
        <h1>Blog & Diary</h1>
        <p>一座轻量的个人网站，用来写日记、整理文章、收藏链接。首页现在只做入口，把真正的写作和检索留给各自独立的页面。</p>
        <div class="actions">
            <a class="button green" href="diary.html">进入日记</a>
            <a class="button" href="posts.html">进入文章</a>
            <a class="button secondary" href="favorites.html">进入收藏</a>
        </div>
    </div>
</header>

<main class="container">
    <div class="portal-grid">
        <article class="portal-card">
            <div>
                <h2>日记</h2>
                <p>记录生活片段、心情和心得。支持多标签、标题正文搜索、复制 Markdown 和 GitHub 管理入口。</p>
            </div>
            <a class="button green" href="diary.html">写日记</a>
        </article>
        <article class="portal-card">
            <div>
                <h2>文章</h2>
                <p>整理技术学习、读书记录和长篇思考。标题自由拟定，排序按时间，多标签检索。</p>
            </div>
            <a class="button" href="posts.html">写文章</a>
        </article>
        <article class="portal-card">
            <div>
                <h2>收藏</h2>
                <p>保存网页链接、描述、多标签和视频时间戳笔记。适合归档工具、资料与灵感。</p>
            </div>
            <a class="button secondary" href="favorites.html">看收藏</a>
        </article>
    </div>
</main>

<footer>
© 2026 wasdwry
</footer>
<a class="top-button" href="#top">Top</a>
</body>
</html>
