<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wasdwry 的文章</title>
<style>
:root{--text:#1f2933;--muted:#607084;--line:rgba(31,41,51,.12);--panel:rgba(255,255,255,.94);--primary:#1769aa;--primary-dark:#0f4d7d;--green:#2f7d5b;--danger:#b42318}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#eef4f8 url("assets/pixel-town-bg.png") center top/cover fixed no-repeat;color:var(--text)}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(120deg,rgba(247,250,252,.50),rgba(230,240,247,.32));z-index:-1}
header{min-height:360px;padding:34px 20px 72px}.navbar,.hero,.container{max-width:1120px;margin-left:auto;margin-right:auto}
.navbar{display:flex;align-items:center;justify-content:space-between;gap:18px}.logo{font-size:20px;font-weight:700}
nav{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px 18px}nav a{color:#203247;text-decoration:none;font-weight:700}
.hero{margin-top:74px}.hero h1{margin:0;font-size:clamp(38px,7vw,70px);line-height:1}.hero p{max-width:680px;margin:22px 0 0;color:#24384d;font-size:19px;line-height:1.75}
.actions,.item-actions,.tag-filter,.tag-picker,.tag-add-row{display:flex;flex-wrap:wrap;gap:10px}.actions{margin-top:30px}
.button{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border-radius:8px;border:1px solid transparent;background:var(--primary);color:white;text-decoration:none;font-weight:700;box-shadow:0 10px 24px rgba(23,105,170,.22);cursor:pointer;font:inherit}
.button:hover{background:var(--primary-dark)}.button.secondary{background:rgba(255,255,255,.78);color:#16324d;border-color:rgba(22,50,77,.2);box-shadow:none}.button.green{background:var(--green);box-shadow:0 10px 24px rgba(47,125,91,.22)}.button.danger{background:white;color:var(--danger);border-color:rgba(180,35,24,.28);box-shadow:none}.button.small{min-height:34px;padding:0 12px;font-size:14px}
.top-button{position:fixed;right:18px;bottom:18px;z-index:20;min-width:52px;min-height:42px;padding:0 12px;border-radius:8px;background:#16324d;color:white;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 10px 24px rgba(31,41,51,.2)}
.container{margin-top:-54px;padding:0 20px 52px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 18px 45px rgba(31,41,51,.12);margin-bottom:24px}
.section-title{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:18px}.section-title h2{margin:0;font-size:26px}.section-title span,.entry-card p,.form-note,.empty-state{color:var(--muted)}
.compose-card,.entry-card{background:white;padding:20px;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 22px rgba(31,41,51,.07)}.field,.search-box{margin-bottom:14px}
label{display:block;margin:0 0 7px;color:#34495e;font-weight:700}input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;font:inherit;color:var(--text);background:white;outline:none}textarea{min-height:210px;resize:vertical;line-height:1.7}.form-note{margin:12px 0 0;line-height:1.7}
.tag-add-row{align-items:center}.tag-add-row input{flex:1;min-width:220px}.tag-picker{margin-top:8px}.tag-filter{margin:4px 0 18px}
.tag-button{min-height:34px;padding:0 12px;border-radius:999px;border:1px solid var(--line);background:white;color:#34495e;cursor:pointer;font:inherit}.tag-button.active,.tag-button.selected{background:#16324d;color:white;border-color:#16324d}.tag-button.empty{color:var(--muted);cursor:default}
.timeline-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.entry-card{display:flex;flex-direction:column;gap:12px}.entry-card h3{margin:0}.entry-card p{margin:0;line-height:1.7}
.meta,.tags{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:14px}.tag{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;background:#fff7e1;color:#7a5500;font-size:13px;font-weight:700}
.empty-state{padding:18px;border:1px dashed rgba(96,112,132,.45);border-radius:8px;background:rgba(255,255,255,.72);line-height:1.7}footer{text-align:center;padding:34px 20px 44px;color:#536170}
@media(max-width:820px){header{min-height:480px}.navbar,.section-title{align-items:flex-start;flex-direction:column}nav{justify-content:flex-start}.hero{margin-top:62px}.timeline-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header id="top">
    <div class="navbar"><div class="logo">wasdwry.github.io</div><nav><a href="index.html">首页</a><a href="diary.html">日记</a><a href="posts.html">文章</a><a href="favorites.html">收藏</a><a href="https://github.com/wasdwry/wasdwry.github.io" target="_blank" rel="noopener">GitHub</a></nav></div>
    <div class="hero"><h1>Posts</h1><p>这里是独立文章页。标题完全由你自己拟定，页面按时间排序，并支持按钮式多标签与内容查找。</p><div class="actions"><a class="button green" href="#compose">写文章</a><a class="button secondary" href="#postList">浏览文章</a></div></div>
</header>
<main class="container">
    <section class="panel" id="compose">
        <div class="section-title"><h2>写文章</h2><span>新增标签后，点击按钮即可选择</span></div>
        <article class="compose-card">
            <form id="entryForm">
                <div class="field"><label for="entryTitle">标题</label><input id="entryTitle" type="text" placeholder="例如：一次建站记录"></div>
                <div class="field"><label for="entryDate">日期时间</label><input id="entryDate" type="datetime-local"></div>
                <div class="field">
                    <label for="newTagInput">标签按钮</label>
                    <div class="tag-add-row"><input id="newTagInput" type="text" placeholder="一次添加一个标签"><button class="button secondary" id="addTagButton" type="button">添加标签</button></div>
                    <div class="tag-picker" id="composeTags"><button class="tag-button empty" type="button" disabled>暂无标签</button></div>
                </div>
                <div class="field"><label for="entryContent">内容</label><textarea id="entryContent" placeholder="写下文章正文。"></textarea></div>
                <div class="actions"><button class="button green" type="submit">保存草稿</button><button class="button secondary" id="copyMarkdown" type="button">复制文章 Markdown</button><a class="button secondary" id="createLink" href="https://github.com/wasdwry/wasdwry.github.io/new/main?filename=posts/new-article.md" target="_blank" rel="noopener">发布到 GitHub</a></div>
                <p class="form-note" id="draftStatus">还没有保存文章草稿。</p>
            </form>
        </article>
    </section>
    <section class="panel"><div class="section-title"><h2>检索文章</h2><span>多标签筛选和标题/正文搜索可以叠加</span></div><div class="search-box"><label for="contentSearch">内容查找</label><input id="contentSearch" type="search" placeholder="搜索标题或正文..."></div><div class="tag-filter" id="tagFilter"><button class="tag-button active" type="button" data-tag="all">全部</button></div></section>
    <section class="panel" id="postList"><div class="section-title"><h2>文章时间线</h2><span>按发布时间倒序排列</span></div><div class="timeline-grid" id="entryList"><div class="empty-state">正在读取文章……</div></div></section>
</main>
<footer>© 2026 wasdwry</footer><a class="top-button" href="#top">Top</a>
<script src="assets/music-player.js" defer></script>
<script>
const repoOwner="wasdwry",repoName="wasdwry.github.io",branch="main";
const repoBase=`https://github.com/${repoOwner}/${repoName}`,apiBase=`https://api.github.com/repos/${repoOwner}/${repoName}/contents`;
const state={items:[],selectedTags:new Set(),searchQuery:"",tagLibrary:new Set()};
const els={form:document.getElementById("entryForm"),title:document.getElementById("entryTitle"),date:document.getElementById("entryDate"),content:document.getElementById("entryContent"),link:document.getElementById("createLink"),status:document.getElementById("draftStatus"),composeTags:document.getElementById("composeTags"),newTag:document.getElementById("newTagInput")};
function pad(v){return String(v).padStart(2,"0")}function toDateTimeInput(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`}function toDisplayDate(v){return v?v.replace("T"," "):""}function filenameDate(v){return v.replace("T","-").replace(":","-")}
function slugify(text,fallback){const slug=text.toLowerCase().normalize("NFKD").replace(/[^\w\s-]/g,"").trim().replace(/[\s_]+/g,"-").replace(/-+/g,"-").slice(0,42);return slug||fallback}
function parseTags(text){return text.split(/[，,\s]+/).map(t=>t.trim()).filter(Boolean)}function escapeHtml(text){return String(text).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function loadTagLibrary(){parseTags(localStorage.getItem("wasdwry-post-tag-library")||"").forEach(t=>state.tagLibrary.add(t))}function saveTagLibrary(){localStorage.setItem("wasdwry-post-tag-library",[...state.tagLibrary].join(", "))}
function addTag(tag){const clean=tag.trim();if(!clean)return;state.tagLibrary.add(clean);saveTagLibrary();renderComposeTags();els.newTag.value=""}
function renderComposeTags(){const tags=[...state.tagLibrary].sort((a,b)=>a.localeCompare(b,"zh-CN"));if(!tags.length){els.composeTags.innerHTML=`<button class="tag-button empty" type="button" disabled>暂无标签</button>`;return}els.composeTags.innerHTML=tags.map(tag=>`<button class="tag-button ${state.selectedTags.has(tag)?"selected":""}" type="button" data-compose-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`).join("")}
function markdownTemplate(){const title=els.title.value.trim()||"未命名文章",date=toDisplayDate(els.date.value||toDateTimeInput(new Date())),tags=[...state.selectedTags].join(", "),body=els.content.value.trim()||"正文内容……";const lines=[`# ${title}`,"",`日期：${date}`];if(tags)lines.push(`标签：${tags}`);lines.push("",body,"");return lines.join("\n")}
function newFileUrl(){const date=els.date.value||toDateTimeInput(new Date()),filename=`posts/${filenameDate(date)}-${slugify(els.title.value,"new-article")}.md`;return `${repoBase}/new/${branch}?${new URLSearchParams({filename}).toString()}`}function updateLink(){els.link.href=newFileUrl()}
function saveDraft(){localStorage.setItem("wasdwry-post-draft",JSON.stringify({title:els.title.value,date:els.date.value,tags:[...state.selectedTags],content:els.content.value,savedAt:new Date().toISOString()}));els.status.textContent=`草稿已保存：${new Date().toLocaleString()}`}
async function copyMarkdown(){const md=markdownTemplate();try{await navigator.clipboard.writeText(md)}catch(e){const t=document.createElement("textarea");t.value=md;t.style.position="fixed";t.style.left="-9999px";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t)}els.status.textContent="Markdown 已复制，可以粘贴到 GitHub 页面。"}
function loadDraft(){const d=JSON.parse(localStorage.getItem("wasdwry-post-draft")||"null");if(!d)return;els.title.value=d.title||"";els.date.value=d.date||els.date.value;els.content.value=d.content||"";(Array.isArray(d.tags)?d.tags:parseTags(d.tags||"")).forEach(t=>{state.selectedTags.add(t);state.tagLibrary.add(t)});els.status.textContent=`已载入最近草稿：${d.savedAt?new Date(d.savedAt).toLocaleString():""}`}
function parseDateFromFilename(name){const m=name.match(/(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);if(!m)return null;return{display:`${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}`,timestamp:new Date(`${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:00`).getTime()}}function parseDateFromText(md){const m=md.match(/^日期[:：]\s*(.+)$/m);if(!m)return null;const v=m[1].trim();return{display:v,timestamp:new Date(v.replace(" ","T")).getTime()||0}}
function parseMarkdown(md,file){const title=(md.match(/^#\s+(.+)$/m)||[])[1]||file.name.replace(/\.md$/,""),tagLine=(md.match(/^标签[:：]\s*(.+)$/m)||[])[1]||"",date=parseDateFromFilename(file.name)||parseDateFromText(md)||{display:"未标注时间",timestamp:0};const body=md.split("\n").filter(l=>!/^#\s+/.test(l)).filter(l=>!/^(日期|标签)[:：]/.test(l.trim())).join("\n").trim();const tags=parseTags(tagLine);tags.forEach(t=>state.tagLibrary.add(t));return{title:title.trim(),tags,date:date.display,timestamp:date.timestamp,body,excerpt:body.replace(/\s+/g," ").slice(0,90)||"还没有正文摘要。",path:file.path,viewUrl:`${repoBase}/blob/${branch}/${file.path}`,editUrl:`${repoBase}/edit/${branch}/${file.path}`,deleteUrl:`${repoBase}/delete/${branch}/${file.path}`}}
async function loadEntries(){try{const res=await fetch(`${apiBase}/posts?ref=${branch}`);if(res.status===404){state.items=[];renderAll();return}if(!res.ok)throw new Error(`HTTP ${res.status}`);const files=(await res.json()).filter(f=>f.type==="file"&&f.name.endsWith(".md"));state.items=(await Promise.all(files.map(async f=>parseMarkdown(await (await fetch(f.download_url)).text(),f)))).sort((a,b)=>b.timestamp-a.timestamp);saveTagLibrary();renderAll()}catch(e){document.getElementById("entryList").innerHTML=`<div class="empty-state">读取文章失败，请稍后刷新。</div>`}}
function visibleItems(){const q=state.searchQuery.trim().toLowerCase();return state.items.filter(item=>{const tagOk=state.selectedTags.size===0||item.tags.some(t=>state.selectedTags.has(t));const searchOk=!q||`${item.title}\n${item.body}`.toLowerCase().includes(q);return tagOk&&searchOk})}
function renderFilterTags(){const tags=new Set(state.items.flatMap(i=>i.tags));const buttons=[`<button class="tag-button ${state.selectedTags.size===0?"active":""}" type="button" data-tag="all">全部</button>`];[...tags].sort((a,b)=>a.localeCompare(b,"zh-CN")).forEach(tag=>buttons.push(`<button class="tag-button ${state.selectedTags.has(tag)?"active":""}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`));document.getElementById("tagFilter").innerHTML=buttons.join("")}
function renderList(){const list=document.getElementById("entryList"),items=visibleItems();if(!items.length){list.innerHTML=`<div class="empty-state">没有找到符合条件的文章。</div>`;return}list.innerHTML=items.map(item=>`<article class="entry-card"><div class="meta"><span>${escapeHtml(item.date)}</span></div><h3>${escapeHtml(item.title)}</h3><p>${escapeHtml(item.excerpt)}</p>${item.tags.length?`<div class="tags">${item.tags.map(tag=>`<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>`:""}<div class="item-actions"><a class="button small" href="${item.viewUrl}" target="_blank" rel="noopener">查看</a><a class="button small secondary" href="${item.editUrl}" target="_blank" rel="noopener">编辑</a><a class="button small danger" href="${item.deleteUrl}" target="_blank" rel="noopener">删除</a></div></article>`).join("")}
function renderAll(){renderComposeTags();renderFilterTags();renderList()}
document.getElementById("tagFilter").addEventListener("click",e=>{const b=e.target.closest("[data-tag]");if(!b)return;const tag=b.dataset.tag;if(tag==="all")state.selectedTags.clear();else if(state.selectedTags.has(tag))state.selectedTags.delete(tag);else state.selectedTags.add(tag);renderAll()});document.getElementById("contentSearch").addEventListener("input",e=>{state.searchQuery=e.target.value;renderAll()});
els.composeTags.addEventListener("click",e=>{const b=e.target.closest("[data-compose-tag]");if(!b)return;const tag=b.dataset.composeTag;if(state.selectedTags.has(tag))state.selectedTags.delete(tag);else state.selectedTags.add(tag);renderAll();updateLink()});document.getElementById("addTagButton").addEventListener("click",()=>addTag(els.newTag.value));els.newTag.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addTag(els.newTag.value)}});
els.form.addEventListener("input",updateLink);els.form.addEventListener("submit",e=>{e.preventDefault();saveDraft();updateLink()});document.getElementById("copyMarkdown").addEventListener("click",()=>{copyMarkdown();updateLink()});
els.date.value=toDateTimeInput(new Date());loadTagLibrary();loadDraft();renderComposeTags();updateLink();loadEntries();
</script>
</body>
</html>
