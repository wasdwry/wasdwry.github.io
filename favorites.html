<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wasdwry 的收藏栏</title>
<style>
:root{
    --text:#1f2933;
    --muted:#607084;
    --line:rgba(31,41,51,0.12);
    --panel:rgba(255,255,255,0.94);
    --primary:#1769aa;
    --primary-dark:#0f4d7d;
    --green:#2f7d5b;
    --danger:#b42318;
}
*{ box-sizing:border-box; }
body{
    margin:0;
    font-family:Arial,"Microsoft YaHei",sans-serif;
    background:#eef4f8 url("assets/pixel-beach-bg.png") center top/cover fixed no-repeat;
    color:var(--text);
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(120deg,rgba(247,250,252,0.9),rgba(230,240,247,0.76));
    z-index:-1;
}
header{
    min-height:360px;
    padding:34px 20px 72px;
}
.navbar,.hero,.container{
    max-width:1120px;
    margin-left:auto;
    margin-right:auto;
}
.navbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
}
.logo{
    font-size:20px;
    font-weight:700;
}
nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:8px 18px;
}
nav a{
    color:#203247;
    text-decoration:none;
    font-weight:600;
}
.hero{
    margin-top:74px;
}
.hero h1{
    margin:0;
    font-size:clamp(38px,7vw,70px);
    line-height:1;
    letter-spacing:0;
}
.hero p{
    max-width:680px;
    margin:22px 0 0;
    color:#3f5368;
    font-size:19px;
    line-height:1.75;
}
.actions,.item-actions,.tag-filter{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.actions{
    margin-top:30px;
}
.button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 16px;
    border-radius:8px;
    border:1px solid transparent;
    background:var(--primary);
    color:white;
    text-decoration:none;
    font-weight:700;
    box-shadow:0 10px 24px rgba(23,105,170,0.22);
    cursor:pointer;
    font:inherit;
}
.button:hover{
    background:var(--primary-dark);
}
.button.secondary{
    background:rgba(255,255,255,0.78);
    color:#16324d;
    border-color:rgba(22,50,77,0.2);
    box-shadow:none;
}
.button.green{
    background:var(--green);
    box-shadow:0 10px 24px rgba(47,125,91,0.22);
}
.button.danger{
    background:white;
    color:var(--danger);
    border-color:rgba(180,35,24,0.28);
    box-shadow:none;
}
.button.small{
    min-height:34px;
    padding:0 12px;
    font-size:14px;
}
.top-button{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:20;
    min-width:52px;
    min-height:42px;
    padding:0 12px;
    border-radius:8px;
    background:#16324d;
    color:white;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    box-shadow:0 10px 24px rgba(31,41,51,0.2);
}
.container{
    margin-top:-54px;
    padding:0 20px 52px;
}
.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:26px;
    box-shadow:0 18px 45px rgba(31,41,51,0.12);
    margin-bottom:24px;
}
.section-title{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    margin-bottom:18px;
}
.section-title h2{
    margin:0;
    font-size:26px;
}
.section-title span,.favorite-card p,.form-note,.empty-state{
    color:var(--muted);
}
.compose-card,.favorite-card{
    background:white;
    padding:20px;
    border:1px solid var(--line);
    border-radius:8px;
    box-shadow:0 8px 22px rgba(31,41,51,0.07);
}
.compose-card h3,.favorite-card h3{
    margin:0 0 14px;
    line-height:1.35;
}
.field,.search-box{
    margin-bottom:14px;
}
label{
    display:block;
    margin:0 0 7px;
    color:#34495e;
    font-weight:700;
}
input,textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
    font:inherit;
    color:var(--text);
    background:white;
    outline:none;
}
textarea{
    min-height:150px;
    resize:vertical;
    line-height:1.7;
}
.form-note{
    margin:12px 0 0;
    line-height:1.7;
}
.tag-filter{
    margin:4px 0 18px;
}
.tag-button{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:white;
    color:#34495e;
    cursor:pointer;
    font:inherit;
}
.tag-button.active{
    background:#16324d;
    color:white;
    border-color:#16324d;
}
.favorites-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:18px;
}
.favorite-card{
    display:flex;
    flex-direction:column;
    gap:12px;
}
.favorite-card h3{
    margin-bottom:0;
}
.favorite-card p{
    margin:0;
    line-height:1.7;
}
.favorite-url{
    color:var(--primary);
    overflow-wrap:anywhere;
    text-decoration:none;
    font-weight:700;
}
.meta,.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    color:var(--muted);
    font-size:14px;
}
.tag{
    display:inline-flex;
    align-items:center;
    min-height:26px;
    padding:0 9px;
    border-radius:999px;
    background:#fff7e1;
    color:#7a5500;
    font-size:13px;
    font-weight:700;
}
.timestamp-list{
    display:grid;
    gap:8px;
    padding:12px;
    border:1px solid rgba(23,105,170,0.14);
    border-radius:8px;
    background:#f6fbff;
}
.timestamp-item{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:10px;
    align-items:start;
}
.timestamp-item a{
    color:var(--primary);
    font-weight:700;
    text-decoration:none;
}
.timestamp-item span{
    color:var(--muted);
    line-height:1.6;
}
.empty-state{
    padding:18px;
    border:1px dashed rgba(96,112,132,0.45);
    border-radius:8px;
    background:rgba(255,255,255,0.72);
    line-height:1.7;
}
footer{
    text-align:center;
    padding:34px 20px 44px;
    color:#536170;
}
@media (max-width:820px){
    header{
        min-height:480px;
    }
    .navbar,.section-title{
        align-items:flex-start;
        flex-direction:column;
    }
    nav{
        justify-content:flex-start;
    }
    .hero{
        margin-top:62px;
    }
    .favorites-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <div class="navbar">
        <div class="logo">wasdwry.github.io</div>
        <nav>
            <a href="index.html">首页</a>
            <a href="diary.html">日记</a>
            <a href="posts.html">文章</a>
            <a href="favorites.html">收藏</a>
            <a href="https://github.com/wasdwry/wasdwry.github.io" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </div>

    <div class="hero" id="top">
        <h1>Favorites</h1>
        <p>收藏网页链接、工具、资料和灵感。每个收藏都可以带多个标签，也可以写一段可选描述，方便以后按主题和关键词找回来。</p>
        <div class="actions">
            <a class="button green" href="#compose">添加收藏</a>
            <a class="button secondary" href="#favoritesList">浏览收藏</a>
        </div>
    </div>
</header>

<main class="container">
    <section class="panel" id="compose">
        <div class="section-title">
            <h2>添加收藏</h2>
            <span>复制 Markdown 后粘贴到 GitHub 新建文件页</span>
        </div>
        <article class="compose-card">
            <form id="favoriteForm">
                <div class="field">
                    <label for="favoriteTitle">标题</label>
                    <input id="favoriteTitle" type="text" placeholder="例如：MDN Web Docs">
                </div>
                <div class="field">
                    <label for="favoriteUrl">网页链接</label>
                    <input id="favoriteUrl" type="url" placeholder="https://example.com">
                </div>
                <div class="field">
                    <label for="favoriteDate">收藏日期</label>
                    <input id="favoriteDate" type="datetime-local">
                </div>
                <div class="field">
                    <label for="favoriteTags">标签，可填写一个或多个</label>
                    <input id="favoriteTags" type="text" placeholder="例如：工具, 学习, 前端">
                </div>
                <div class="field">
                    <label for="favoriteDescription">描述</label>
                    <textarea id="favoriteDescription" placeholder="这个网页为什么值得收藏？描述可不填。"></textarea>
                </div>
                <div class="field">
                    <label for="favoriteTimestamps">时间戳笔记</label>
                    <textarea id="favoriteTimestamps" placeholder="适合视频收藏。每行一个时间点，例如：&#10;00:01:23 - 这里讲到关键概念&#10;12:05 - 想回看的片段"></textarea>
                </div>
                <div class="actions">
                    <button class="button green" type="submit">保存草稿</button>
                    <button class="button secondary" id="copyFavoriteMarkdown" type="button">复制收藏 Markdown</button>
                    <a class="button secondary" id="createFavoriteLink" href="https://github.com/wasdwry/wasdwry.github.io/new/main?filename=favorites/new-favorite.md" target="_blank" rel="noopener">发布到 GitHub</a>
                </div>
                <p class="form-note" id="favoriteDraftStatus">还没有保存收藏草稿。</p>
            </form>
        </article>
    </section>

    <section class="panel">
        <div class="section-title">
            <h2>检索收藏</h2>
            <span>多标签筛选会显示包含任一标签的收藏</span>
        </div>
        <div class="search-box">
            <label for="favoriteSearch">关键词查找</label>
            <input id="favoriteSearch" type="search" placeholder="搜索标题、链接或描述...">
        </div>
        <div class="tag-filter" id="tagFilter">
            <button class="tag-button active" type="button" data-tag="all">全部</button>
        </div>
    </section>

    <section class="panel" id="favoritesList">
        <div class="section-title">
            <h2>收藏列表</h2>
            <span>按收藏时间倒序排列</span>
        </div>
        <div class="favorites-grid" id="favoriteList">
            <div class="empty-state">正在读取收藏……</div>
        </div>
    </section>
</main>

<footer>
© 2026 wasdwry
</footer>

<a class="top-button" href="#top">Top</a>

<script>
const repoOwner = "wasdwry";
const repoName = "wasdwry.github.io";
const branch = "main";
const repoBase = `https://github.com/${repoOwner}/${repoName}`;
const apiBase = `https://api.github.com/repos/${repoOwner}/${repoName}/contents`;
const state = {
    favorites:[],
    selectedTags:new Set(),
    searchQuery:""
};
const form = document.getElementById("favoriteForm");
const titleInput = document.getElementById("favoriteTitle");
const urlInput = document.getElementById("favoriteUrl");
const dateInput = document.getElementById("favoriteDate");
const tagsInput = document.getElementById("favoriteTags");
const descriptionInput = document.getElementById("favoriteDescription");
const timestampsInput = document.getElementById("favoriteTimestamps");
const createLink = document.getElementById("createFavoriteLink");
const copyButton = document.getElementById("copyFavoriteMarkdown");
const statusText = document.getElementById("favoriteDraftStatus");
const favoriteSearch = document.getElementById("favoriteSearch");

function pad(value){
    return String(value).padStart(2,"0");
}

function toDateTimeInput(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function toDisplayDate(value){
    if(!value) return "";
    return value.replace("T"," ");
}

function filenameDate(value){
    return value.replace("T","-").replace(":","-");
}

function slugify(text, fallback){
    const slug = text.toLowerCase()
        .normalize("NFKD")
        .replace(/[^\w\s-]/g,"")
        .trim()
        .replace(/[\s_]+/g,"-")
        .replace(/-+/g,"-")
        .slice(0,42);
    return slug || fallback;
}

function parseTags(text){
    return text.split(/[，,\s]+/)
        .map(tag => tag.trim())
        .filter(Boolean);
}

function escapeHtml(text){
    return String(text).replace(/[&<>"']/g, char => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
    }[char]));
}

function favoriteMarkdown(){
    const title = titleInput.value.trim() || "未命名收藏";
    const url = urlInput.value.trim() || "https://example.com";
    const date = toDisplayDate(dateInput.value || toDateTimeInput(new Date()));
    const tags = parseTags(tagsInput.value).join(", ");
    const description = descriptionInput.value.trim();
    const timestamps = timestampsInput.value.trim();
    const lines = [`# ${title}`,"",`链接：${url}`,`日期：${date}`];
    if(tags) lines.push(`标签：${tags}`);
    lines.push("");
    if(description) lines.push(description,"");
    if(timestamps) lines.push("时间戳：",timestamps,"");
    return lines.join("\n");
}

function newFavoriteUrl(){
    const date = dateInput.value || toDateTimeInput(new Date());
    const filename = `favorites/${filenameDate(date)}-${slugify(titleInput.value, "new-favorite")}.md`;
    const params = new URLSearchParams({ filename });
    return `${repoBase}/new/${branch}?${params.toString()}`;
}

function updateCreateLink(){
    createLink.href = newFavoriteUrl();
}

function saveDraft(){
    const draft = {
        title:titleInput.value.trim(),
        url:urlInput.value.trim(),
        date:dateInput.value,
        tags:tagsInput.value.trim(),
        description:descriptionInput.value.trim(),
        timestamps:timestampsInput.value.trim(),
        savedAt:new Date().toISOString()
    };
    localStorage.setItem("wasdwry-favorite-draft", JSON.stringify(draft));
    statusText.textContent = `草稿已保存：${new Date().toLocaleString()}`;
}

async function copyMarkdown(){
    const markdown = favoriteMarkdown();
    try{
        await navigator.clipboard.writeText(markdown);
        statusText.textContent = "Markdown 已复制，可以粘贴到 GitHub 页面。";
    }catch(error){
        const helper = document.createElement("textarea");
        helper.value = markdown;
        helper.setAttribute("readonly","");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        document.body.removeChild(helper);
        statusText.textContent = "Markdown 已复制，可以粘贴到 GitHub 页面。";
    }
}

function loadDraft(){
    const draft = JSON.parse(localStorage.getItem("wasdwry-favorite-draft") || "null");
    if(!draft) return;
    titleInput.value = draft.title || "";
    urlInput.value = draft.url || "";
    dateInput.value = draft.date || dateInput.value;
    tagsInput.value = draft.tags || "";
    descriptionInput.value = draft.description || "";
    timestampsInput.value = draft.timestamps || "";
    statusText.textContent = `已载入最近草稿：${draft.savedAt ? new Date(draft.savedAt).toLocaleString() : ""}`;
}

function parseDateFromFilename(name){
    const match = name.match(/(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);
    if(!match) return null;
    return {
        display:`${match[1]}-${match[2]}-${match[3]} ${match[4]}:${match[5]}`,
        timestamp:new Date(`${match[1]}-${match[2]}-${match[3]}T${match[4]}:${match[5]}:00`).getTime()
    };
}

function parseDateFromText(markdown){
    const match = markdown.match(/^日期[:：]\s*(.+)$/m);
    if(!match) return null;
    const value = match[1].trim();
    return {
        display:value,
        timestamp:new Date(value.replace(" ","T")).getTime() || 0
    };
}

function parseFavorite(markdown, file){
    const titleMatch = markdown.match(/^#\s+(.+)$/m);
    const urlMatch = markdown.match(/^链接[:：]\s*(.+)$/m);
    const tagMatch = markdown.match(/^标签[:：]\s*(.+)$/m);
    const fileDate = parseDateFromFilename(file.name);
    const textDate = parseDateFromText(markdown);
    const date = fileDate || textDate || { display:"未标注时间", timestamp:0 };
    const title = titleMatch ? titleMatch[1].trim() : file.name.replace(/\.md$/,"");
    const url = urlMatch ? urlMatch[1].trim() : "";
    const tags = tagMatch ? parseTags(tagMatch[1]) : [];
    const timestampBlock = markdown.match(/^时间戳[:：]\s*\n([\s\S]*)$/m);
    const description = markdown.split("\n")
        .filter(line => !/^#\s+/.test(line))
        .filter(line => !/^(链接|日期|标签)[:：]/.test(line.trim()))
        .join("\n")
        .split(/^时间戳[:：]\s*$/m)[0]
        .trim();
    const timestampText = timestampBlock ? timestampBlock[1].trim() : "";
    const timestamps = parseTimestampNotes(timestampText);
    return {
        title,
        url,
        tags,
        description,
        timestamps,
        date:date.display,
        timestamp:date.timestamp,
        path:file.path,
        viewUrl:`${repoBase}/blob/${branch}/${file.path}`,
        editUrl:`${repoBase}/edit/${branch}/${file.path}`,
        deleteUrl:`${repoBase}/delete/${branch}/${file.path}`
    };
}

function parseTimestampNotes(text){
    return text.split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
            const match = line.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s*[-—:：]\s*(.*)$/);
            if(!match) return { time:"", note:line, seconds:0 };
            return {
                time:match[1],
                note:match[2].trim(),
                seconds:timestampToSeconds(match[1])
            };
        });
}

function timestampToSeconds(value){
    const parts = value.split(":").map(Number);
    if(parts.length === 2) return parts[0] * 60 + parts[1];
    return parts[0] * 3600 + parts[1] * 60 + parts[2];
}

function timestampUrl(url, seconds){
    if(!url || !seconds) return url;
    try{
        const parsed = new URL(url);
        if(parsed.hostname.includes("youtube.com") || parsed.hostname.includes("youtu.be")){
            parsed.searchParams.set("t", `${seconds}s`);
            return parsed.toString();
        }
        if(parsed.hostname.includes("bilibili.com")){
            parsed.searchParams.set("t", seconds);
            return parsed.toString();
        }
        parsed.hash = `t=${seconds}`;
        return parsed.toString();
    }catch(error){
        return url;
    }
}

function renderTimestampNotes(item){
    if(!item.timestamps.length) return "";
    return `<div class="timestamp-list">${item.timestamps.map(stamp => `
        <div class="timestamp-item">
            ${stamp.time ? `<a href="${escapeHtml(timestampUrl(item.url,stamp.seconds))}" target="_blank" rel="noopener">${escapeHtml(stamp.time)}</a>` : "<span>笔记</span>"}
            <span>${escapeHtml(stamp.note || "未填写笔记。")}</span>
        </div>
    `).join("")}</div>`;
}

async function loadFavorites(){
    try{
        const response = await fetch(`${apiBase}/favorites?ref=${branch}`);
        if(response.status === 404){
            state.favorites = [];
            renderAll();
            return;
        }
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const files = await response.json();
        const markdownFiles = files.filter(file => file.type === "file" && file.name.endsWith(".md"));
        const items = await Promise.all(markdownFiles.map(async file => {
            const raw = await fetch(file.download_url);
            const markdown = raw.ok ? await raw.text() : "";
            return parseFavorite(markdown,file);
        }));
        state.favorites = items.sort((a,b) => b.timestamp - a.timestamp);
        renderAll();
    }catch(error){
        console.warn("读取收藏失败", error);
        document.getElementById("favoriteList").innerHTML = `<div class="empty-state">读取收藏失败，请稍后刷新。</div>`;
    }
}

function visibleFavorites(){
    const query = state.searchQuery.trim().toLowerCase();
    return state.favorites.filter(item => {
        const matchesTags = state.selectedTags.size === 0 ||
            item.tags.some(tag => state.selectedTags.has(tag));
        const searchText = `${item.title}\n${item.url}\n${item.description}\n${item.timestamps.map(stamp => stamp.note).join("\n")}`.toLowerCase();
        const matchesSearch = !query || searchText.includes(query);
        return matchesTags && matchesSearch;
    });
}

function renderTags(){
    const allTags = new Set(state.favorites.flatMap(item => item.tags));
    const buttons = [`<button class="tag-button ${state.selectedTags.size === 0 ? "active" : ""}" type="button" data-tag="all">全部</button>`];
    [...allTags].sort((a,b) => a.localeCompare(b,"zh-CN")).forEach(tag => {
        buttons.push(`<button class="tag-button ${state.selectedTags.has(tag) ? "active" : ""}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`);
    });
    document.getElementById("tagFilter").innerHTML = buttons.join("");
}

function renderFavorites(){
    const container = document.getElementById("favoriteList");
    const filtered = visibleFavorites();
    if(filtered.length === 0){
        container.innerHTML = `<div class="empty-state">没有找到符合条件的收藏。</div>`;
        return;
    }
    container.innerHTML = filtered.map(item => `
        <article class="favorite-card">
            <div class="meta"><span>${escapeHtml(item.date)}</span></div>
            <h3>${escapeHtml(item.title)}</h3>
            ${item.url ? `<a class="favorite-url" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.url)}</a>` : ""}
            ${item.description ? `<p>${escapeHtml(item.description)}</p>` : `<p>暂无描述。</p>`}
            ${renderTimestampNotes(item)}
            ${item.tags.length ? `<div class="tags">${item.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
            <div class="item-actions">
                ${item.url ? `<a class="button small green" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">打开</a>` : ""}
                <a class="button small" href="${item.viewUrl}" target="_blank" rel="noopener">查看</a>
                <a class="button small secondary" href="${item.editUrl}" target="_blank" rel="noopener">编辑</a>
                <a class="button small danger" href="${item.deleteUrl}" target="_blank" rel="noopener">删除</a>
            </div>
        </article>
    `).join("");
}

function renderAll(){
    renderTags();
    renderFavorites();
}

document.getElementById("tagFilter").addEventListener("click", event => {
    const button = event.target.closest("[data-tag]");
    if(!button) return;
    const tag = button.dataset.tag;
    if(tag === "all"){
        state.selectedTags.clear();
    }else if(state.selectedTags.has(tag)){
        state.selectedTags.delete(tag);
    }else{
        state.selectedTags.add(tag);
    }
    renderAll();
});

favoriteSearch.addEventListener("input", event => {
    state.searchQuery = event.target.value;
    renderAll();
});

form.addEventListener("input", updateCreateLink);
form.addEventListener("submit", event => {
    event.preventDefault();
    saveDraft();
    updateCreateLink();
});
copyButton.addEventListener("click", () => {
    copyMarkdown();
    updateCreateLink();
});

dateInput.value = toDateTimeInput(new Date());
loadDraft();
updateCreateLink();
loadFavorites();
</script>

</body>
</html>
